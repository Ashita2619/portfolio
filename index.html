<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ashita Jawali | Multi-omics, Bioinformatics, AI/ML, Drug and Biomarker Discovery</title>
  <meta name="description" content="Ashita Jawali — Bioinformatician | Multi-omics, Bioinformatics, AI/ML, Drug and Biomarker Discovery | KDHE." />
  <style>
    :root {
      --bg: #0b1220;
      --text: #e9eefc;
      --muted: #b7c3e6;
      --accent: #7aa2ff;
      --accent2: #7affd0;
      --border: rgba(255, 255, 255, .10);
      --card: rgba(255, 255, 255, .04);
      --card2: rgba(255, 255, 255, .03);
      --shadow: 0 14px 34px rgba(0, 0, 0, .35);
      --radius: 18px;
      --max: 1120px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      line-height: 1.55;
      background:
        linear-gradient(rgba(11,18,32,0.85), rgba(11,18,32,0.85)),
        url("Portfolio.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-filter: blur(2px);
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: var(--max); margin: 0 auto; padding: 0 18px; }
    header { padding: 44px 0 14px; }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .brand { display: flex; align-items: center; gap: 14px; min-width: 260px; }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(122, 162, 255, .9), rgba(122, 255, 208, .7));
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      flex: 0 0 auto;
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    h1 { margin: 0; font-size: 26px; letter-spacing: .2px; }
    .headline { margin: 5px 0 0; font-size: 14px; color: var(--muted); }
    .subline { margin: 6px 0 0; font-size: 12px; color: var(--muted); }
    nav { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, .04);
      border-radius: 999px;
      color: var(--text);
      font-size: 14px;
    }

    .pill:hover { text-decoration: none; background: rgba(255, 255, 255, .07); }
    main { padding: 10px 0 70px; }
    .grid { display: grid; grid-template-columns: 1.25fr .75fr; gap: 16px; }
    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .card h2 { margin: 0 0 10px; font-size: 16px; letter-spacing: .2px; }
    .muted { color: var(--muted); }
    .cta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(122, 162, 255, .18);
      color: var(--text);
      font-weight: 800;
    }

    .btn.secondary { background: rgba(255, 255, 255, .04); }
    .btn:hover { text-decoration: none; filter: brightness(1.05); }
    .kvs { display: grid; grid-template-columns: 130px 1fr; gap: 8px 12px; }
    @media (max-width: 520px) { .kvs { grid-template-columns: 1fr; } }
    .kvs .k { font-weight: 800; color: var(--text); }
    .kvs .v { color: var(--muted); }
    .section { display: grid; gap: 16px; margin-top: 16px; }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      font-size: 12px;
      color: var(--text);
      border-radius: 999px;
      border: 1px solid rgba(122, 255, 208, .20);
      background: rgba(122, 255, 208, .10);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    @media (max-width: 980px) { .projects-grid { grid-template-columns: 1fr; } }

    .proj {
      border: 1px solid var(--border);
      background: var(--card2);
      border-radius: 16px;
      overflow: hidden;
    }

    .proj img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: rgba(0, 0, 0, .20);
    }

    .proj-body { padding: 14px; }
    .proj-title { margin: 0 0 6px; font-weight: 900; }
    .proj-desc { margin: 0 0 10px; font-size: 14px; color: var(--muted); }
    .proj-links a { margin-right: 10px; font-weight: 900; }
    .items { display: grid; gap: 10px; }
    .item {
      padding: 12px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, .03);
      margin-bottom: 8px;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: baseline;
    }

    .item-title { font-weight: 900; }
    .item-meta { color: var(--muted); font-size: 13px; }
    
    .small { font-size: 12px; color: var(--muted); }
    .divider { height: 1px; background: var(--border); margin: 12px 0; }
    footer {
      padding: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
      background: rgba(0, 0, 0, .15);
    }

    @media print {
      body { background: white; color: #111; }
      a { color: #111; text-decoration: none; }
      .pill, .btn { display: none !important; }
      .card { box-shadow: none; background: white; border: 1px solid #ddd; }
      footer { display: none; }
    }
  </style>
</head>

<body>
  <header class="wrap">
    <div class="top">
      <div class="brand">
        <div class="avatar" id="avatarBox" aria-hidden="true">
          <img src="Ashita_Photo.png" alt="Ashita Jawali">
        </div>
        <div>
          <h1 id="name"></h1>
          <div class="headline" id="headline"></div>
          <div class="subline" id="subline"></div>
        </div>
      </div>

      <nav>
        <a class="pill" href="#about">About</a>
        <a class="pill" href="#projects">Projects</a>
        <a class="pill" href="#experience">Experience</a>
        <a class="pill" href="#publications">Publications</a>
        <a class="pill" href="#abstracts">Abstracts</a>
        <a class="pill" href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="wrap grid">
    <div class="section">
      <section class="card" id="about">
        <h2>About</h2>
        <p class="muted" id="aboutText"></p>
        <div class="cta" id="cta"></div>
        <div class="divider"></div>
        <div>
          <div class="item-title">Core areas</div>
          <div class="chips" id="focusChips"></div>
        </div>
      </section>

      <section class="card" id="projects">
        <h2>Selected projects</h2>
        <div class="projects-grid" id="projectsGrid"></div>
      </section>

      <section class="card" id="experience">
        <h2>Experience</h2>
        <div class="items" id="expItems"></div>
      </section>

      <section class="card" id="publications">
        <h2>Publications</h2>
        <div class="items" id="pubItems"></div>
      </section>

      <section class="card" id="abstracts">
        <h2>Conference abstracts</h2>
        <div class="items" id="absItems"></div>
      </section>
    </div>

    <div class="section">
      <aside class="card">
        <h2>Quick info</h2>
        <div class="kvs" id="quickInfo"></div>
        <div class="divider"></div>
        <div class="small" id="updated"></div>
      </aside>

      <aside class="card" id="education">
        <h2>Education</h2>
        <div class="items" id="eduItems"></div>
      </aside>

      <aside class="card" id="skills">
        <h2>Skills</h2>
        <div class="chips" id="skillChips"></div>
      </aside>

      <aside class="card" id="languages">
        <h2>Languages</h2>
        <div class="chips" id="languageChips"></div>
      </aside>

      <aside class="card" id="memberships">
        <h2>Memberships</h2>
        <div class="items" id="membershipItems"></div>
      </aside>

      <aside class="card" id="contact">
        <h2>Contact</h2>
        <div class="items" id="contactBlocks"></div>
      </aside>
    </div>
  </main>

  <footer>
    © <span id="year"></span> <span id="name2"></span>
  </footer>

  <script>
    const SITE = {
      name: "Ashita Jawali",
      headline: "Bioinformatician | Multi-omics | AI/ML | Drug Discovery | Biomarker Discovery | NGS | Public Health Genomics",
      location: "Topeka, Kansas, USA",
      emailPrimary: "ashit.bt18@bmsce.ac.in",
      github: "https://github.com/yourgithub",
      linkedin: "https://linkedin.com/in/yourlinkedin",
      updated: "Updated: 2026",

      links: [
        { label: "GitHub", url: "https://github.com/Ashita2619", primary: true },
        { label: "LinkedIn", url: "https://www.linkedin.com/in/ashita-jawali-9a6872198/" },
        { label: "CV (PDF)", url: "AshitaJawali_CV.pdf" }
      ],

      about: "Bioinformatician working at the intersection of multi-omics, machine learning, and drug discovery. My work focuses on analyzing large-scale genomic and transcriptomic datasets, building reproducible bioinformatics pipelines, and applying computational approaches to biomarker discovery and disease research.",

      focus: [
        "Bioinformatics", "Multi-omics", "Machine Learning", "Drug Discovery",
        "Biomarker Discovery", "RNA-seq", "Variant Calling", "NGS Analysis",
        "Public Health Genomics", "Pipeline Development"
      ],

      experience: [
        {
          title: "Bioinformatician",
          org: "Kansas Department of Health and Environment",
          location: "Kansas, USA",
          dates: "2024 – Present",
          bullets: [
            "Analyzed NGS data for public health genomics and pathogen surveillance.",
            "Developed bioinformatics pipelines for genomic data processing."
          ]
        },
        {
          title: "Graduate Teaching Assistant",
          org: "Carnegie Mellon University",
          location: "Pennsylvania, USA",
          dates: "2022 – 2023"
        },
        {
          title: "Research Intern",
          org: "Dr. Hiller Lab, CMU",
          location: "Pennsylvania, USA",
          dates: "2022 – 2023",
          bullets: [
            "Analyzed mobile elements in Streptococcus thermophilus, identifying transporters and regulatory regions",
            "Built Python-based pipelines for sequence annotation and comparative genomics",
            "Performed BLAST, multiple sequence alignment, and domain analysis",
            "Conducted phylogenetic analysis to trace gene transfer events"
          ]
        },
        {
          title: "Associate Consultant",
          org: "IQVIA",
          location: "Karnataka, India",
          dates: "2022 – 2022",
          bullets: [
            "Queried and analyzed large-scale clinical datasets using SQL/PLSQL",
            "Built dashboards in Power BI to communicate pharmacovigilance insights",
            "Gained exposure to drug development lifecycle and regulatory systems (Argus Safety)"
          ]
        }
      ],

      education: [
        { title: "Master's Degree", org: "Carnegie Mellon University", dates: "2023" },
        { title: "Bachelor's Degree", org: "BMS College of Engineering", dates: "2022" }
      ],

      skills: ["Python", "R", "Bioinformatics", "NGS", "Linux", "Nextflow", "Docker"],
      languages: ["English", "Hindi", "Kannada", "Telugu"],
      
      publications: [
        { 
          title: "Methods for the Detection and Quantification of Micro and Nanoplastics- A Review", 
          venue: "Asian Journal of Biotechnology and Bioresource Technology", 
          year: "2021", 
          url: "https://www.researchgate.net/publication/355277721_Methods_for_the_Detection_and_Quantification_of_Micro_and_Nanoplastics-_A_Review" 
        }
      ],

      abstracts: [
        { 1. Poster Presentation — ISCB-UK 2026 (Selected)
          2. Research Hub Grant Proposal Submitted:
             “Early Detection and Personalized Drug Discovery for Pancreatic Cancer Using Multi‑Omics and AI/ML Approaches”
             Link: https://www.researchhub.com/proposal/4347/early-detection-and-personalized-drug-discovery-for-pancreatic-cancer-using-multi-omics-and-aiml-approaches
          3. ISMB 2026 abstract submitted for talk and poster
  }
      ], 

      memberships: [
        { title: "International Society for Computational Biology (ISCB)", dates: "2026 – Present" }
      ],

      contact: {
        email: "ashit.bt18@bmsce.ac.in",
        location: "Topeka, Kansas, USA"
      }
    };

    // ---------- Rendering Engine ----------
    const el = (id) => document.getElementById(id);
    const safeLink = (u) => (u && u !== "#") ? u : "#";

    // Header & Intro
    el("name").textContent = SITE.name;
    el("name2").textContent = SITE.name;
    el("headline").textContent = SITE.headline;
    el("updated").textContent = SITE.updated || "";
    el("year").textContent = new Date().getFullYear();
    el("aboutText").textContent = SITE.about;

    // CTA Buttons
    SITE.links.forEach(b => {
      const a = document.createElement("a");
      a.className = "btn" + (b.primary ? "" : " secondary");
      a.href = safeLink(b.url);
      a.textContent = b.label;
      el("cta").appendChild(a);
    });

    // Core Area Chips
    SITE.focus.forEach(t => {
      const s = document.createElement("span");
      s.className = "chip";
      s.textContent = t;
      el("focusChips").appendChild(s);
    });

    // Quick Info Table
    const quickRows = [["Location", SITE.location], ["Email", SITE.emailPrimary]];
    quickRows.forEach(([k, v]) => {
      const kDiv = document.createElement("div"); kDiv.className = "k"; kDiv.textContent = k;
      const vDiv = document.createElement("div"); vDiv.className = "v"; vDiv.textContent = v;
      el("quickInfo").appendChild(kDiv); el("quickInfo").appendChild(vDiv);
    });

    // Experience (with Bullets)
    SITE.experience.forEach(e => {
      const d = document.createElement("div");
      d.className = "item";
      const bulletHtml = e.bullets 
        ? `<ul class="muted small" style="margin-top: 8px; padding-left: 20px;">
            ${e.bullets.map(b => `<li>${b}</li>`).join('')}
           </ul>` 
        : '';
      d.innerHTML = `
        <div class="item-top"><div class="item-title">${e.title}</div><div class="item-meta">${e.dates}</div></div>
        <div class="muted">${e.org} · ${e.location}</div>
        ${bulletHtml}`;
      el("expItems").appendChild(d);
    });

    // Skills & Languages
    SITE.skills.forEach(s => {
      const chip = document.createElement("span"); chip.className = "chip"; chip.textContent = s;
      el("skillChips").appendChild(chip);
    });
    SITE.languages.forEach(l => {
      const chip = document.createElement("span"); chip.className = "chip"; chip.textContent = l;
      el("languageChips").appendChild(chip);
    });

    // Education
    SITE.education.forEach(edu => {
      const d = document.createElement("div");
      d.className = "item";
      d.innerHTML = `<div class="item-top"><div class="item-title">${edu.title}</div><div class="item-meta">${edu.dates}</div></div>
                     <div class="muted">${edu.org}</div>`;
      el("eduItems").appendChild(d);
    });

    // Publications
    SITE.publications.forEach(p => {
      const d = document.createElement("div");
      d.className = "item";
      d.innerHTML = `<div class="item-top">
                       <div class="item-title"><a href="${p.url}" target="_blank">${p.title}</a></div>
                       <div class="item-meta">${p.venue} · ${p.year}</div>
                     </div>`;
      el("pubItems").appendChild(d);
    });

    // Abstracts Fallback
    if (SITE.abstracts.length === 0) {
      el("absItems").innerHTML = '<div class="muted">No abstracts listed yet.</div>';
    }

    // Memberships
    SITE.memberships.forEach(m => {
      const d = document.createElement("div");
      d.className = "item";
      d.innerHTML = `<div class="item-top"><div class="item-title">${m.title}</div><div class="item-meta">${m.dates}</div></div>`;
      el("membershipItems").appendChild(d);
    });

    // Contact Box
    el("contactBlocks").innerHTML = `
      <div class="item"><div class="item-title">Email</div><div class="muted">${SITE.contact.email}</div></div>
      <div class="item"><div class="item-title">Location</div><div class="muted">${SITE.contact.location}</div></div>`;

  </script>
</body>
</html>
