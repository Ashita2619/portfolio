<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ashita Jawali | Bioinformatics | AI/ML | Drug Discovery</title>

  <style>
    :root {
      --bg: #0b1220;
      --text: #e9eefc;
      --muted: #b7c3e6;
      --accent: #7aa2ff;
      --border: rgba(255, 255, 255, .10);
      --card: rgba(255, 255, 255, .04);
      --shadow: 0 14px 34px rgba(0, 0, 0, .35);
      --radius: 18px;
      --max: 1120px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, Segoe UI, Roboto, Arial;
      color: var(--text);
      background:
        linear-gradient(rgba(11,18,32,0.85), rgba(11,18,32,0.85)),
        url("Portfolio.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .wrap { max-width: var(--max); margin: auto; padding: 20px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
    }

    .item {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .item-title { font-weight: bold; }
    .item-meta { color: var(--muted); font-size: 13px; }

    .chip {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 20px;
      background: rgba(122,162,255,.15);
      margin: 4px;
      font-size: 12px;
    }

    .btn {
      padding: 8px 14px;
      border-radius: 10px;
      background: rgba(122,162,255,.2);
      border: 1px solid var(--border);
      margin-right: 8px;
      display: inline-block;
      color: white;
      text-decoration: none;
    }

    .secondary { background: rgba(255,255,255,.05); }

  </style>
</head>

<body>
<div class="wrap">

  <h1 id="name"></h1>
  <div id="headline"></div>
  <div id="updated" style="color:var(--muted); margin-bottom:10px;"></div>

  <div id="cta"></div>

  <div class="grid">
    <div>
      <div class="card">
        <h2>About</h2>
        <p id="aboutText"></p>
        <div id="focusChips"></div>
      </div>

      <div class="card">
        <h2>Experience</h2>
        <div id="expItems"></div>
      </div>

      <div class="card">
        <h2>Education</h2>
        <div id="eduItems"></div>
      </div>

      <div class="card">
        <h2>Publications</h2>
        <div id="pubItems"></div>
      </div>

      <div class="card">
        <h2>Memberships</h2>
        <div id="membershipItems"></div>
      </div>

    </div>

    <div>
      <div class="card">
        <h2>Quick Info</h2>
        <div id="quickInfo"></div>
      </div>

      <div class="card">
        <h2>Skills</h2>
        <div id="skillChips"></div>
      </div>

      <div class="card">
        <h2>Languages</h2>
        <div id="languageChips"></div>
      </div>

      <div class="card">
        <h2>Contact</h2>
        <div id="contactBlocks"></div>
      </div>
    </div>
  </div>

  <footer style="text-align:center; margin-top:20px; color:var(--muted);">
    © <span id="year"></span> <span id="name2"></span>
  </footer>

</div>

<script>
// ---------- SITE DATA ----------
const SITE = {
  name: "Ashita Jawali",
  headline: "Bioinformatician | Multi-omics | AI/ML | Drug Discovery | Biomarker Discovery",
  updated: "Updated 2026",
  location: "Kansas, USA",
  emailPrimary: "ashit.bt18@bmsce.ac.in",

  links: [
    { label: "GitHub", url: "https://github.com/Ashita2619", primary: true },
    { label: "LinkedIn", url: "https://www.linkedin.com/in/ashita-jawali-9a6872198/" },
    { label: "CV", url: "AshitaJawali_CV.pdf" }
  ],

  about: "Bioinformatician working at the intersection of multi-omics, machine learning, and drug discovery. I build NGS pipelines, analyze genomic and transcriptomic data, and apply computational methods to biomarker and therapeutic discovery.",

  focus: ["Bioinformatics","Multi-omics","Machine Learning","Drug Discovery","RNA-seq","Variant Calling"],

  experience: [
    {
      title: "Bioinformatician",
      org: "Kansas Department of Health and Environment",
      location: "USA",
      dates: "2024 – Present",
      bullets: [
        "Built NGS analysis pipelines",
        "Performed variant calling and genomic surveillance",
        "Automated workflows using Nextflow and Docker"
      ]
    }
  ],

  education: [
    {
      title: "B.Tech Biotechnology",
      org: "BMS College of Engineering",
      dates: "2018 – 2022"
    }
  ],

  publications: [
    {
      title: "Methods for Detection and Quantification of Micro and Nanoplastics",
      venue: "Asian Journal of Biotechnology",
      year: "2021",
      url: "https://www.researchgate.net/publication/355277721"
    }
  ],

  memberships: [
    { title: "International Society for Computational Biology", dates: "Member" }
  ],

  skills: ["Python","R","NGS","Nextflow","Docker","Linux","Machine Learning"],
  languages: ["English","Kannada","Hindi"],

  contact: {
    email: "ashit.bt18@bmsce.ac.in",
    location: "Kansas, USA"
  }
};

// ---------- Rendering Engine ----------
const el = (id) => document.getElementById(id);
const safeLink = (u) => (u && u !== "#") ? u : "#";

// Header
el("name").textContent = SITE.name;
el("name2").textContent = SITE.name;
el("headline").textContent = SITE.headline;
el("updated").textContent = SITE.updated;
el("year").textContent = new Date().getFullYear();
el("aboutText").textContent = SITE.about;

// CTA Buttons
SITE.links.forEach(b => {
  const a = document.createElement("a");
  a.className = "btn" + (b.primary ? "" : " secondary");
  a.href = safeLink(b.url);
  a.textContent = b.label;
  el("cta").appendChild(a);
});

// Focus Chips
SITE.focus.forEach(t => {
  const s = document.createElement("span");
  s.className = "chip";
  s.textContent = t;
  el("focusChips").appendChild(s);
});

// Quick Info
const quickRows = [["Location", SITE.location], ["Email", SITE.emailPrimary]];
quickRows.forEach(([k, v]) => {
  const row = document.createElement("div");
  row.textContent = k + ": " + v;
  el("quickInfo").appendChild(row);
});

// Experience
SITE.experience.forEach(e => {
  const d = document.createElement("div");
  d.className = "item";

  let bullets = "";
  if (e.bullets) {
    bullets = "<ul>";
    e.bullets.forEach(b => bullets += `<li>${b}</li>`);
    bullets += "</ul>";
  }

  d.innerHTML = `
    <div class="item-title">${e.title}</div>
    <div class="item-meta">${e.org} · ${e.dates}</div>
    ${bullets}
  `;
  el("expItems").appendChild(d);
});

// Education
SITE.education.forEach(edu => {
  const d = document.createElement("div");
  d.className = "item";
  d.innerHTML = `<div class="item-title">${edu.title}</div>
                 <div class="item-meta">${edu.org} · ${edu.dates}</div>`;
  el("eduItems").appendChild(d);
});

// Publications
SITE.publications.forEach(p => {
  const d = document.createElement("div");
  d.className = "item";
  d.innerHTML = `<a href="${p.url}" target="_blank">${p.title}</a>
                 <div class="item-meta">${p.venue} · ${p.year}</div>`;
  el("pubItems").appendChild(d);
});

// Memberships
SITE.memberships.forEach(m => {
  const d = document.createElement("div");
  d.className = "item";
  d.innerHTML = `<div class="item-title">${m.title}</div>
                 <div class="item-meta">${m.dates}</div>`;
  el("membershipItems").appendChild(d);
});

// Skills
SITE.skills.forEach(s => {
  const chip = document.createElement("span");
  chip.className = "chip";
  chip.textContent = s;
  el("skillChips").appendChild(chip);
});

// Languages
SITE.languages.forEach(l => {
  const chip = document.createElement("span");
  chip.className = "chip";
  chip.textContent = l;
  el("languageChips").appendChild(chip);
});

// Contact
el("contactBlocks").innerHTML = `
  <div class="item"><b>Email:</b> ${SITE.contact.email}</div>
  <div class="item"><b>Location:</b> ${SITE.contact.location}</div>
`;

</script>
</body>
</html>
